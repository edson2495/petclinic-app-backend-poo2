server:
  port: 9000
spring:
  application:
    name: petclinic-app-backend-poo2
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update #create-drop #create, update, none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/petclinic?serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true
    username: dev
    password: dev123456